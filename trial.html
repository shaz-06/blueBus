<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport meta tag is essential for responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blueBus - Book Bus & Train Tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
        }
        .hero-section {
            /* Replaced local 'BlueBus.png' with a placeholder */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://placehold.co/1920x1080/3b82f6/ffffff?text=BlueBus+Hero');
            background-size: cover;
            background-position: center;
        }
        .offer-card {
            transition: all 0.3s ease-in-out;
        }
        .offer-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .active-tab {
            border-bottom-color: #3b82f6;
            color: #3b82f6;
            font-weight: 600;
        }
        .tab-inactive {
            border-bottom-color: transparent;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Styles for seat selection */
        .seat {
            border: 1px solid #93c5fd;
            transition: background-color 0.2s;
        }
        .seat-available:hover {
            background-color: #dbeafe;
        }
        .seat-selected {
            background-color: #3b82f6 !important;
            color: white;
            border-color: #2563eb;
        }
        .seat-booked {
            background-color: #e5e7eb;
            color: #6b7280;
            cursor: not-allowed;
            border-color: #d1d5db;
        }
        /* Modal styles */
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }
        .modal-content {
            animation: slideInUp 0.3s;
        }
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-action-area .book-btn, .result-action-area .price-text {
            transition: all 0.2s ease-in-out;
        }
        .result-action-area:hover .book-btn {
            background-color: #1d4ed8; /* blue-700 */
            transform: scale(1.05);
        }
        .result-action-area:hover .price-text {
            color: #1d4ed8; /* blue-700 */
            transform: scale(1.05);
            display: inline-block;
        }
        #seatTooltip {
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .nav-link {
            position: relative;
            padding-bottom: 4px; /* Space for the underline */
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #3b82f6;
            transition: width 0.3s ease-in-out;
        }
        .nav-link:hover::after {
            width: 100%;
        }
         /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>

            app.innerHTML = `<div class="container mx-auto p-4 sm:p-6 lg:p-8 fade-in">${bookingsHTML}</div>`;
            document.getElementById('backToSearchBtn').addEventListener('click', () => {
                state.currentView = 'SEARCH';
                render();
            });
        };
        
        const renderPayment = () => {
            document.body.style.overflow = 'auto';
            const content = `
                <div class="max-w-2xl mx-auto bg-white p-6 sm:p-8 rounded-lg shadow-lg">
                    <button id="backBtn" class="mb-6 bg-gray-200 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-300">&larr; Back</button>
                    <h2 class="text-2xl font-bold mb-6">Passenger Details & Payment</h2>
                    
                    <div class="mb-6 bg-blue-50 p-4 rounded-lg">
                        <h3 class="font-bold text-lg">Total Amount: ₹${state.totalFare}</h3>
                    </div>

                    <!-- Passenger Details -->
                    <form id="paymentForm">
                        <div class="mb-6">
                            <h3 class="font-semibold text-lg mb-2">Passenger Details</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label for="p-name" class="block text-sm font-medium text-gray-700">Full Name</label>
                                    <input type="text" id="p-name" class="mt-1 block w-full border-gray-400 rounded-lg" required value="${state.username || ''}">
                                </div>
                                <div>
                                    <label for="p-age" class="block text-sm font-medium text-gray-700">Age</label>
                                    <input type="number" id="p-age" class="mt-1 block w-full border-gray-400 rounded-lg" required>
                                </div>
                                <div class="sm:col-span-2">
                                    <label for="p-email" class="block text-sm font-medium text-gray-700">Email</label>
                                    <input type="email" id="p-email" class="mt-1 block w-full border-gray-400 rounded-lg" required value="${state.email || ''}">
                                </div>
                            </div>
                        </div>

                        <!-- Payment Options -->
                        <div class="mt-8">
                            <h3 class="font-semibold text-lg mb-4">Select Payment Method</h3>
                            <!-- Responsive tabs -->
                            <div class="flex border-b mb-4 overflow-x-auto no-scrollbar">
                                <button type="button" data-payment-method="card" class="payment-tab py-2 px-4 border-b-2 font-medium text-center active-tab flex-shrink-0">Credit/Debit Card</button>
                                <button type="button" data-payment-method="upi" class="payment-tab py-2 px-4 border-b-2 font-medium text-center text-gray-500 tab-inactive flex-shrink-0">UPI</button>
                                <button type="button" data-payment-method="netbanking" class="payment-tab py-2 px-4 border-b-2 font-medium text-center text-gray-500 tab-inactive flex-shrink-0">Net Banking</button>
                            </div>

                            <div id="payment-details">
                                <!-- Card Details -->
                                <div id="card-payment" class="payment-option">
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                         <div class="sm:col-span-2">
                                            <label for="card-number" class="block text-sm font-medium text-gray-700">Card Number</label>
                                            <input type="text" id="card-number" value="1234 5678 9012 3456" class="mt-1 block w-full border-gray-400 rounded-lg" required>
                                        </div>
                                        <div>
                                            <label for="card-expiry" class="block text-sm font-medium text-gray-700">Expiry (MM/YY)</label>
                                            <input type="text" id="card-expiry" value="12/28" class="mt-1 block w-full border-gray-400 rounded-lg" required>
                                        </div>
                                        <div>
                                            <label for="card-cvc" class="block text-sm font-medium text-gray-700">CVC</label>
                                            <input type="text" id="card-cvc" value="123" class="mt-1 block w-full border-gray-400 rounded-lg" required>
                                        </div>
                                    </div>
                                </div>
                                <!-- UPI Details -->
                                <div id="upi-payment" class="payment-option hidden">
                                    <label for="upi-id" class="block text-sm font-medium text-gray-700">UPI ID</label>
                                    <div class="flex mt-1">
                                        <input type="text" id="upi-id" placeholder="yourname@bank" class="flex-grow block w-full border-gray-400 rounded-l-lg">
                                        <button type="button" class="bg-gray-200 text-gray-800 px-4 rounded-r-lg hover:bg-gray-300 font-semibold">Verify</button>
                                    </div>
                                    <p class="text-xs text-gray-500 mt-2">You will receive a payment request on your UPI app.</p>
                                </div>
                                <!-- Net Banking Details -->
                                <div id="netbanking-payment" class="payment-option hidden">
                                    <label for="bank-select" class="block text-sm font-medium text-gray-700">Select Bank</label>
                                    <select id="bank-select" class="mt-1 block w-full border-gray-400 rounded-lg">
                                        <option>State Bank of India</option>
                                        <option>HDFC Bank</option>
                                        <option>ICICI Bank</option>
                                        <option>Axis Bank</option>
                                        <option>Kotak Mahindra Bank</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="mt-8 w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">Pay ₹${state.totalFare}</button>
                    </form>
                </div>
            `;
            app.innerHTML = `<div class="container mx-auto p-4 sm:p-6 lg:p-8 fade-in">${content}</div>`;
            addPaymentListeners();
        };

        const renderConfirmation = () => {
            document.body.style.overflow = 'auto';
            const { passengerName, trip, seats, totalFare, bookingId } = state.bookingDetails;
            const content = `
                <div class="max-w-2xl mx-auto bg-white p-6 sm:p-8 rounded-lg shadow-lg text-center">
                    <svg class="w-16 h-16 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h2 class="text-2xl font-bold text-green-600 mb-2">Booking Confirmed!</h2>
                    <p class="text-gray-600 mb-6">Your e-receipt has been sent to your email.</p>
                    <div class="bg-gray-50 p-6 rounded-lg text-left mb-6">
                        <p class="mb-2"><strong>Booking ID:</strong> <span class="font-mono">${bookingId}</span></p>
                        <p class="mb-2"><strong>Passenger:</strong> ${passengerName}</p>
                        <p class="mb-2"><strong>Trip:</strong> ${trip.operator} from ${trip.from} to ${trip.to}</p>
                        ${seats && seats.length > 0 ? `<p class="mb-2"><strong>Seats:</strong> ${seats.join(', ')}</p>` : ''}
                        <p class="text-lg font-bold mt-4"><strong>Total Paid:</strong> ₹${totalFare}</p>
                    </div>
                    <!-- Responsive buttons -->
                    <div class="flex flex-col sm:flex-row gap-4">
                        <button id="viewReceiptBtn" class="flex-1 bg-blue-500 text-white font-semibold py-2 px-6 rounded-lg hover:bg-blue-600">View E-Receipt</button>
                        <button id="newBookingBtn" class="flex-1 bg-gray-200 text-gray-800 py-2 px-6 rounded-lg hover:bg-gray-300">New Booking</button>
                    </div>
                </div>
            `;
            app.innerHTML = `<div class="container mx-auto p-4 sm:p-6 lg:p-8 fade-in">${content}</div>`;
            addConfirmationListeners();
        };
        
        const renderReceipt = () => {
            const { passengerName, passengerAge, trip, seats, totalFare, bookingId, date } = state.bookingDetails;
            // Get current date from the 'today' constant
            const today = '2025-10-26';
            const bookingDateString = new Date(today.replace(/-/g, '/')).toDateString();

            const content = `
                <div class="p-6 sm:p-8">
                    <div class="flex justify-between items-start pb-4 border-b">
                        <div>
                            <h2 class="text-3xl font-bold text-blue-600">blueBus</h2>
                            <p class="text-gray-500">E-Receipt / Ticket</p>
                        </div>
                        <button id="closeReceiptModal" class="text-3xl text-gray-500 hover:text-gray-800 leading-none">&times;</button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4 mt-6">
                        <div>
                            <p class="text-sm text-gray-500">Booking ID</p>
                            <p class="font-mono font-semibold">${bookingId}</p>
                        </div>
                        <div class="sm:text-right">
                            <p class="text-sm text-gray-500">Booking Date</p>
                            <p class="font-semibold">${bookingDateString}</p>
                        </div>
                         <div>
                            <p class="text-sm text-gray-500">Passenger</p>
                            <p class="font-semibold">${passengerName} (Age ${passengerAge})</p>
                        </div>
                        <div class="sm:text-right">
                            <p class="text-sm text-gray-500">Total Fare</p>
                            <p class="font-bold text-xl">₹ ${totalFare}</p>
                        </div>
                    </div>
                    <div class="mt-8 bg-blue-50 rounded-lg p-6">
                        <h3 class="font-bold text-lg mb-4">Trip Details</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <p class="font-semibold text-lg">${trip.from} &rarr; ${trip.to}</p>
                                <p class="text-gray-600">${trip.operator} (${trip.type})</p>
                            </div>
                            <div class="sm:text-right">
                                <p class="font-semibold">Date: ${new Date(date.replace(/-/g, '/')).toDateString()}</p>
                                <p>Departure: <strong>${trip.depTime}</strong> | Arrival: <strong>${trip.arrTime}</strong></p>
                            </div>
                        </div>
                        ${seats && seats.length > 0 ? `<p class="mt-4"><strong>Seats:</strong> ${seats.join(', ')}</p>` : ''}
                    </div>
                    <div class="mt-8 text-center">
                        <p class="text-gray-600">Thank you for choosing blueBus!</p>
                        <button onclick="window.print()" class="mt-4 bg-gray-700 text-white px-6 py-2 rounded-lg hover:bg-gray-800">Print Ticket</button>
                    </div>
                </div>
            `;
            document.getElementById('receiptContent').innerHTML = content;
            receiptModal.classList.remove('hidden');
            document.getElementById('closeReceiptModal').addEventListener('click', () => receiptModal.classList.add('hidden'));
        };

        // --- EVENT LISTENERS ---
        const addHelpPageListeners = () => {
            document.getElementById('backToPreviousBtn').addEventListener('click', () => {
                state.currentView = state.previousView;
                render();
            });
             document.getElementById('helpLoginBtn').addEventListener('click', () => {
                state.previousView = 'HELP';
                state.currentView = 'LOGIN';
                render();
             });
        };

        const addLoginPageListeners = () => {
            document.getElementById('backToPreviousBtn').addEventListener('click', () => {
                state.currentView = state.previousView;
                render();
            });

            document.getElementById('loginFormPage').addEventListener('submit', (e) => {
                e.preventDefault();
                const form = e.target;
                state.isLoggedIn = true;
                state.username = form.email.value.split('@')[0];
                state.email = form.email.value;

                loginBtn.classList.add('hidden');
                profileIcon.classList.remove('hidden');
                profileIcon.classList.add('flex');
                usernameDisplay.textContent = state.username;

                if (state.previousView === 'SEAT_SELECTION' || (state.previousView === 'RESULTS' && state.searchParams.type !== 'BUS')) {
                    state.currentView = 'PAYMENT';
                } else {
                    state.currentView = state.previousView;
                }
                render();
            });
        };

        const addSearchFormListeners = () => {
            const form = document.getElementById('searchForm');
            const tabs = document.querySelectorAll('.search-tab');
            let activeType = 'BUS';

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => {
                        t.classList.remove('active-tab');
                        t.classList.add('tab-inactive', 'text-gray-500');
                    });
                    tab.classList.add('active-tab');
                    tab.classList.remove('tab-inactive', 'text-gray-500');
                    activeType = tab.dataset.type;
                });
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                state.searchParams = {
                    type: activeType,
                    from: form.from.value,
                    to: form.to.value,
                    date: form.date.value,
                };
                
                app.innerHTML = `<div class="text-center p-10">Searching...</div>`;
                setTimeout(() => {
                    state.searchResults = mockData[activeType].filter(
                        item => item.from.toLowerCase() === state.searchParams.from.toLowerCase() &&
                                item.to.toLowerCase() === state.searchParams.to.toLowerCase()
                    );
                    state.currentView = 'RESULTS';
                    render();
                }, 500);
            });

            // What's New slider logic
            const whatsNewContainer = document.getElementById('whatsNewContainer');
            const scrollLeftBtn = document.getElementById('scrollLeftBtn');
            const scrollRightBtn = document.getElementById('scrollRightBtn');

            if (whatsNewContainer && scrollLeftBtn && scrollRightBtn) {
                const scrollAmount = 344; // Card width (w-80 = 320px) + gap (gap-6 = 24px)
                
                const checkScroll = () => {
                    if(whatsNewContainer.scrollWidth <= whatsNewContainer.clientWidth) {
                        scrollLeftBtn.disabled = true;
                        scrollRightBtn.disabled = true;
                        return;
                    }
                    const tolerance = 2;
                    scrollLeftBtn.disabled = whatsNewContainer.scrollLeft <= 0;
                    scrollRightBtn.disabled = whatsNewContainer.scrollLeft + whatsNewContainer.clientWidth >= whatsNewContainer.scrollWidth - tolerance;
                };

                whatsNewContainer.addEventListener('scroll', checkScroll);
                window.addEventListener('resize', checkScroll); // Check on resize
                
                setTimeout(checkScroll, 100);

                scrollLeftBtn.addEventListener('click', () => {
                    whatsNewContainer.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
                });

                scrollRightBtn.addEventListener('click', () => {
                    whatsNewContainer.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                });
            }
        };
        
        const addResultsListeners = () => {
            document.getElementById('backToSearchBtn').addEventListener('click', () => {
                state.currentView = 'SEARCH';
                render();
            });

            document.querySelectorAll('.book-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    const tripId = e.currentTarget.dataset.tripId;
                    state.selectedTrip = state.searchResults.find(t => t.id === tripId);
                    
                    if(state.searchParams.type === 'BUS') {
                        state.currentView = 'SEAT_SELECTION';
                    } else { // For train, skip seat selection for this demo
                        state.selectedSeats = [];
                        state.totalFare = state.selectedTrip.price;
                        if (!state.isLoggedIn) {
                            state.previousView = state.currentView;
                            state.currentView = 'LOGIN';
                        } else {
                           state.currentView = 'PAYMENT';
                        }
                    }
                    render();
                });
            });
        };
        
        const addSeatSelectionListeners = () => {
            document.getElementById('backToResultsBtn').addEventListener('click', () => {
                state.currentView = 'RESULTS';
                state.selectedSeats = [];
                state.totalFare = 0;
                render();
            });

            const tooltip = document.getElementById('seatTooltip');
            const price = state.selectedTrip.price;

            document.querySelectorAll('.seat-available').forEach(seat => {
                seat.addEventListener('mouseover', (e) => {
                    tooltip.innerHTML = `₹ ${price}`;
                    tooltip.classList.remove('hidden');
                });
                seat.addEventListener('mousemove', (e) => {
                    tooltip.style.left = `${e.pageX + 15}px`;
                    tooltip.style.top = `${e.pageY + 15}px`;
                });
                seat.addEventListener('mouseout', (e) => {
                    tooltip.classList.add('hidden');
                });

                seat.addEventListener('click', (e) => {
                    const seatEl = e.currentTarget;
                    const seatId = seatEl.dataset.seatId;
                    const index = state.selectedSeats.indexOf(seatId);
                    if (index > -1) {
                        state.selectedSeats.splice(index, 1);
                        seatEl.classList.remove('seat-selected');
                    } else {
                        state.selectedSeats.push(seatId);
                        seatEl.classList.add('seat-selected');
                    }
                    updateBookingSummary();
                });
            });

            document.getElementById('proceedToPayBtn').addEventListener('click', () => {
                if (!state.isLoggedIn) {
                    state.previousView = state.currentView;
                    state.currentView = 'LOGIN';
                    render();
                } else {
                    state.currentView = 'PAYMENT';
                    render();
                }
            });
        };

        const addPaymentListeners = () => {
            document.getElementById('paymentForm').addEventListener('submit', (e) => {
                e.preventDefault();
                state.bookingDetails = {
                    passengerName: e.target['p-name'].value,
                    passengerAge: e.target['p-age'].value,
                    passengerEmail: e.target['p-email'].value,
                    trip: state.selectedTrip,
                    seats: state.selectedSeats,
                    totalFare: state.totalFare,
                    bookingId: `BB-${Math.random().toString(36).substr(2, 9).toUpperCase()}`,
                    date: state.searchParams.date
                };
                
                app.innerHTML = `<div class="text-center p-10">Processing Payment...</div>`;
                setTimeout(() => {
                    state.currentView = 'CONFIRMATION';
                    render();
                }, 1500);
            });
            
            document.getElementById('backBtn').addEventListener('click', () => {
                state.currentView = state.searchParams.type === 'BUS' ? 'SEAT_SELECTION' : 'RESULTS';
                render();
            });

            const paymentTabs = document.querySelectorAll('.payment-tab');
            const paymentOptions = document.querySelectorAll('.payment-option');

            paymentTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    paymentTabs.forEach(t => {
                        t.classList.remove('active-tab');
                        t.classList.add('tab-inactive', 'text-gray-500');
                    });
                    tab.classList.add('active-tab');
                    tab.classList.remove('tab-inactive', 'text-gray-500');

                    const method = tab.dataset.paymentMethod;
                    paymentOptions.forEach(option => {
                        if (option.id === `${method}-payment`) {
                            option.classList.remove('hidden');
                        } else {
                            option.classList.add('hidden');
                        }
                    });
                });
            });
        };
        
        const addConfirmationListeners = () => {
            document.getElementById('newBookingBtn').addEventListener('click', () => {
                // Reset state for new booking
                Object.assign(state, {
                    currentView: 'SEARCH',
                    searchParams: {},
                    searchResults: [],
                    selectedTrip: null,
                    selectedSeats: [],
                    totalFare: 0,
                    bookingDetails: null,
                });
                render();
            });
            document.getElementById('viewReceiptBtn').addEventListener('click', renderReceipt);
        };
        
        // --- HELPERS ---
        const updateBookingSummary = () => {
            const seatsDisplay = document.getElementById('selectedSeatsDisplay');
            const fareDisplay = document.getElementById('totalFareDisplay');
            const proceedBtn = document.getElementById('proceedToPayBtn');
            
            state.totalFare = state.selectedSeats.length * state.selectedTrip.price;
            seatsDisplay.textContent = state.selectedSeats.join(', ') || 'None';
            fareDisplay.textContent = `₹ ${state.totalFare}`;
            
            if (state.selectedSeats.length > 0) {
                proceedBtn.disabled = false;
            } else {
                proceedBtn.disabled = true;
            }
        };

        const showCustomMessage = (title, message) => {
            const modal = document.getElementById('messageModal');
            document.getElementById('messageTitle').textContent = title;
            document.getElementById('messageBody').textContent = message;
            modal.classList.remove('hidden');

            const closeBtn = document.getElementById('closeMessageModal');
            const okBtn = document.getElementById('okMessageModal');

            const closeModal = () => modal.classList.add('hidden');

            closeBtn.onclick = closeModal;
            okBtn.onclick = closeModal;
        };

        // --- INITIALIZATION ---
        const init = () => {
            // --- Mobile Menu Toggle ---
            mobileMenuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                mobileMenu.classList.toggle('hidden');
            });

            // Close menu when clicking outside
            document.addEventListener('click', (e) => {
                if (!mobileMenu.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
                    mobileMenu.classList.add('hidden');
                }
            });

            // --- Desktop Nav Listeners ---
            document.getElementById('homeLink').addEventListener('click', (e) => {
                e.preventDefault();
                state.currentView = 'SEARCH';
                render();
            });
            
            document.getElementById('offersLink').addEventListener('click', (e) => {
                if (state.currentView !== 'SEARCH') {
                    e.preventDefault();
                    state.currentView = 'SEARCH';
                    render();
                    setTimeout(() => {
                        document.getElementById('offersSection')?.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                }
                // Allow default anchor behavior if already on search page
            });

            const myBookingsBtn = document.getElementById('myBookingsBtn');
            const myBookingsMenu = document.getElementById('myBookingsMenu');

            myBookingsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                myBookingsMenu.classList.toggle('hidden');
            });
            
            document.getElementById('busTicketsLink').addEventListener('click', (e) => {
                e.preventDefault();
                state.currentView = 'BOOKINGS_BUS';
                render();
                myBookingsMenu.classList.add('hidden');
            });
             document.getElementById('trainTicketsLink').addEventListener('click', (e) => {
                e.preventDefault();
                state.currentView = 'BOOKINGS_TRAIN';
                render();
                myBookingsMenu.classList.add('hidden');
            });

            document.getElementById('cancelLink').addEventListener('click', (e) => {
                e.preventDefault();
                // We can create a 'CANCEL' view later
                showCustomMessage("Cancel Bookings", "Go to 'My Bookings' to find and cancel your upcoming trips.");
                myBookingsMenu.classList.add('hidden');
            });

            // --- Mobile Nav Listeners ---
            document.getElementById('mobileOffersLink').addEventListener('click', (e) => {
                e.preventDefault();
                state.currentView = 'SEARCH';
                render();
                setTimeout(() => {
                    document.getElementById('offersSection')?.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            });
            document.getElementById('mobileBusTicketsLink').addEventListener('click', (e) => {
                e.preventDefault();
                state.currentView = 'BOOKINGS_BUS';
                render();
            });
            document.getElementById('mobileTrainTicketsLink').addEventListener('click', (e) => {
                e.preventDefault();
                state.currentView = 'BOOKINGS_TRAIN';
                render();
            });
            document.getElementById('mobileCancelLink').addEventListener('click', (e) => {
                e.preventDefault();
                showCustomMessage("Cancel Bookings", "Go to 'My Bookings' to find and cancel your upcoming trips.");
                mobileMenu.classList.add('hidden');
            });
            // mobileHelpLink and mobileRestroomBtn will work as normal links

            // --- Other Global Listeners ---
            loginBtn.addEventListener('click', () => {
                state.previousView = state.currentView;
                state.currentView = 'LOGIN';
                render();
            });
            
            receiptModal.addEventListener('click', (e) => {
                if (e.target === receiptModal) {
                    receiptModal.classList.add('hidden');
                }
            });

            window.addEventListener('click', (e) => {
                if (myBookingsMenu && !myBookingsMenu.classList.contains('hidden') && !myBookingsBtn.contains(e.target)) {
                    myBookingsMenu.classList.add('hidden');
                }
            });

            render();
        };

        init();
    </script>

</body>
</html>
